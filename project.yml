name: TerminalPro
options:
  bundleIdPrefix: com.terminal
  deploymentTarget:
    iOS: "16.0"
  xcodeVersion: "15.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    GENERATE_INFOPLIST_FILE: YES
    INFOPLIST_KEY_CFBundleURLTypes_TerminalPro: '<array><dict><key>CFBundleTypeRole</key><string>Editor</string><key>CFBundleURLName</key><string>com.terminal.pro</string><key>CFBundleURLSchemes</key><array><string>terminalpro</string></array></dict></array>'
    INFOPLIST_KEY_LSApplicationQueriesSchemes: '<array><string>terminalpro</string></array>'

targets:
  TerminalPro:
    type: application
    platform: iOS
    sources:
      - path: App
      - path: Views
      - path: Models
      - path: Services
      - path: Components
      - path: ViewModels
      - path: Resources
    settings:
      base:
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIStatusBarStyle: UIStatusBarStyleLightContent
        INFOPLIST_KEY_UISupportsAutomaticTermination: NO
        PRODUCT_BUNDLE_IDENTIFIER: com.terminal.pro
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        DEVELOPMENT_TEAM: ""
        CODE_SIGN_STYLE: Automatic
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: YES
        INFOPLIST_KEY_UIRequiresFullScreen: NO
